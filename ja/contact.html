  <style>
    body { font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; line-height: 1.8; color: #333; background: #f9f9f9; margin: 0; padding: 0; }

    textarea { height: 160px; resize: vertical; }

<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P2WX8T7Q" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <div class="container">
    <div class="lang-switch"><a href="/" style="color:#0044cc;">🌐 English</a></div>
    <nav>
      <a href="/ja/index.html">ホーム</a>
      <a href="/ja/blog/index.html">ブログ</a>

    <h1>お問い合わせ</h1>
    <p>サービスに関するご相談・お見積もりのご依頼は、下記フォームまたはメール（<a href="mailto:info@kaika.app">info@kaika.app</a>）にてお気軽にご連絡ください。通常2営業日以内にご返信いたします。</p>
    <form action="https://script.google.com/macros/s/AKfycbyEFkj6Flgenu8cXoIONBSl_a6o6eh78ANQlIZPmNZyyZacXNWa4IqgY5Jt6AOoY-WWNg/exec" onsubmit="submitForm(event)" method="POST">
      <div class="form-group">
        <label>会社名・組織名<span class="required">※必須</span></label>
        <input type="text" name="company" placeholder="株式会社〇〇" required>
      </div>
      <div class="form-group">
        <label>お名前<span class="required">※必須</span></label>
        <input type="text" name="name" placeholder="山田 太郎" required>
      </div>
      <div class="form-group">
        <label>メールアドレス<span class="required">※必須</span></label>
        <input type="email" name="email" placeholder="taro@example.com" required>
      </div>
      <div class="form-group">
        <label>電話番号<span class="required">（任意）</span></label>
        <input type="text" name="phone" placeholder="03-0000-0000">
      </div>
      <div class="form-group">
        <label>お問い合わせ種別<span class="required">※必須</span></label>
        <select name="type" required>
          <option value="">選択してください</option>
          <option value="WEB広告運用支援">WEB広告運用支援</option>
          <option value="LP・サイト改善">LP・サイト改善 / UIUXコンサルティング</option>
          <option value="アクセス解析・計測環境構築">アクセス解析・計測環境構築</option>
          <option value="マーケティング戦略支援">マーケティング戦略・ファネル設計支援</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>お問い合わせ内容<span class="required">※必須</span></label>
        <textarea name="message" placeholder="ご相談内容をご記入ください。" required></textarea>
      </div>
      <button type="submit" class="submit-btn">送信する</button>
    </form>

    <p class="note">※ 送信いただいた個人情報は、お問い合わせへの対応のみに使用します。詳しくは<a href="/ja/privacy.html">プライバシーポリシー</a>をご覧ください。</p>

    <a href="/ja/index.html" class="back-link">← トップに戻る</a>
  </div>
<script>
async function submitForm(e) {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = '送信中...';
  const data = Object.fromEntries(new FormData(form));
  try {
    await fetch("https://script.google.com/macros/s/AKfycbyEFkj6Flgenu8cXoIONBSl_a6o6eh78ANQlIZPmNZyyZacXNWa4IqgY5Jt6AOoY-WWNg/exec", {
      method: "POST",
      body: JSON.stringify(data),
      headers: {"Content-Type": "text/plain"}
    });
    window.location.href = "/ja/thanks";
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '送信する';
    alert('送信に失敗しました。時間をおいて再度お試しください。');
  }
}
</script>
